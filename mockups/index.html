<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionBrave — Mockups Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  padding: 60px 32px;
}
.wrap { max-width: 1200px; margin: 0 auto; }
.head { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
.fox { width: 44px; height: 44px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -.6px; }
.sub { color: #888; font-size: 15px; margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.card {
  background: #0A0A0A;
  border: 1px solid #1F1F1F;
  border-radius: 14px;
  overflow: hidden;
  text-decoration: none;
  color: #fff;
  transition: border-color .18s, transform .18s;
}
.card:hover { border-color: #FBBF2455; transform: translateY(-3px); }
.thumb {
  height: 180px;
  background: linear-gradient(135deg, #1a1208, #050202);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.thumb svg { width: 60%; height: 60%; }
.body { padding: 18px 20px 20px; }
.name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.path { font-size: 12.5px; color: #6b6b6b; font-family: 'SF Mono', Monaco, monospace; }
.tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 700;
  background: #1f1608; color: #FBBF24;
  border: 1px solid #2a1f08;
  padding: 3px 9px; border-radius: 100px;
  margin-top: 10px;
  letter-spacing: .5px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="fox">
      <svg viewBox="0 0 40 40">
        <defs>
          <linearGradient id="fG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD45C"/>
            <stop offset="100%" stop-color="#E89A12"/>
          </linearGradient>
        </defs>
        <path d="M8 6 L14 18 L4 18 Z" fill="url(#fG)"/>
        <path d="M32 6 L36 18 L26 18 Z" fill="url(#fG)"/>
        <ellipse cx="20" cy="22" rx="14" ry="13" fill="url(#fG)"/>
        <path d="M5 22 Q8 18 14 19 L14 28 Q8 29 5 24 Z" fill="#fff"/>
        <path d="M35 22 Q32 18 26 19 L26 28 Q32 29 35 24 Z" fill="#fff"/>
        <ellipse cx="14.5" cy="22" rx="1.8" ry="2.4" fill="#0a0a0a"/>
        <ellipse cx="25.5" cy="22" rx="1.8" ry="2.4" fill="#0a0a0a"/>
        <path d="M16 27 Q20 30 24 27 L22 30 Q20 31.5 18 30 Z" fill="#fff"/>
        <ellipse cx="20" cy="27" rx="1.4" ry="1" fill="#0a0a0a"/>
      </svg>
    </div>
    <h1>VisionBrave Mockups</h1>
  </div>
  <p class="sub">All screens of the AI creative studio platform.</p>

  <div class="grid">

    <a href="landing.html" class="card">
      <div class="thumb" style="background:radial-gradient(ellipse at 50% 60%,#1a1208,#000)">
        <svg viewBox="0 0 100 60">
          <text x="50" y="32" font-family="Inter" font-weight="800" font-size="16" fill="#fff" text-anchor="middle">Create.</text>
          <text x="50" y="48" font-family="Inter" font-weight="800" font-size="16" fill="#FBBF24" text-anchor="middle">AI.</text>
        </svg>
      </div>
      <div class="body">
        <div class="name">Landing Page</div>
        <div class="path">/landing.html</div>
        <span class="tag">MARKETING</span>
      </div>
    </a>

    <a href="signup.html" class="card">
      <div class="thumb" style="background:radial-gradient(ellipse at 30% 50%,#1a1208,#000)">
        <svg viewBox="0 0 100 60">
          <rect x="55" y="15" width="38" height="6" rx="2" fill="#1F1F1F"/>
          <rect x="55" y="26" width="38" height="6" rx="2" fill="#1F1F1F"/>
          <rect x="55" y="37" width="38" height="6" rx="2" fill="#1F1F1F"/>
          <rect x="55" y="48" width="38" height="5" rx="2" fill="#FBBF24"/>
        </svg>
      </div>
      <div class="body">
        <div class="name">Sign Up / Log In</div>
        <div class="path">/signup.html</div>
        <span class="tag">AUTH</span>
      </div>
    </a>

    <a href="home.html" class="card">
      <div class="thumb">
        <svg viewBox="0 0 100 60">
          <rect x="10" y="10" width="80" height="8" rx="2" fill="#1F1F1F"/>
          <rect x="10" y="24" width="20" height="20" rx="3" fill="#1F1F1F"/>
          <rect x="34" y="24" width="20" height="20" rx="3" fill="#1F1F1F"/>
          <rect x="58" y="24" width="20" height="20" rx="3" fill="#FBBF24" opacity=".4"/>
          <rect x="10" y="48" width="80" height="6" rx="2" fill="#1F1F1F"/>
        </svg>
      </div>
      <div class="body">
        <div class="name">Home / Dashboard</div>
        <div class="path">/home.html</div>
        <span class="tag">APP</span>
      </div>
    </a>

    <a href="generate-images.html" class="card">
      <div class="thumb" style="background:radial-gradient(ellipse,#1a1410,#000)">
        <svg viewBox="0 0 100 60">
          <ellipse cx="50" cy="35" rx="25" ry="15" fill="#0a0a0a"/>
          <line x1="35" y1="25" x2="37" y2="48" stroke="#FBBF24" stroke-width="1.5"/>
          <line x1="50" y1="22" x2="50" y2="50" stroke="#FBBF24" stroke-width="1.5"/>
          <line x1="65" y1="25" x2="63" y2="48" stroke="#FBBF24" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="body">
        <div class="name">Generate Images</div>
        <div class="path">/generate-images.html</div>
        <span class="tag">APP</span>
      </div>
    </a>

    <a href="generate-videos.html" class="card">
      <div class="thumb" style="background:linear-gradient(135deg,#3a2030,#0a0510)">
        <svg viewBox="0 0 100 60">
          <ellipse cx="50" cy="30" rx="22" ry="20" fill="#f4d4b0"/>
          <ellipse cx="58" cy="28" rx="14" ry="14" fill="#FF8800" opacity=".5"/>
          <circle cx="50" cy="30" r="8" fill="#fff" opacity=".3"/>
          <polygon points="48,26 48,34 55,30" fill="#fff"/>
        </svg>
      </div>
      <div class="body">
        <div class="name">Generate Videos / Editor</div>
        <div class="path">/generate-videos.html</div>
        <span class="tag">APP</span>
      </div>
    </a>

    <a href="gallery.html" class="card">
      <div class="thumb">
        <svg viewBox="0 0 100 60">
          <rect x="10" y="10" width="22" height="18" rx="2" fill="#FBBF24" opacity=".4"/>
          <rect x="36" y="10" width="22" height="18" rx="2" fill="#1F1F1F"/>
          <rect x="62" y="10" width="22" height="18" rx="2" fill="#1F1F1F"/>
          <rect x="10" y="32" width="22" height="18" rx="2" fill="#1F1F1F"/>
          <rect x="36" y="32" width="22" height="18" rx="2" fill="#FBBF24" opacity=".2"/>
          <rect x="62" y="32" width="22" height="18" rx="2" fill="#1F1F1F"/>
        </svg>
      </div>
      <div class="body">
        <div class="name">Gallery</div>
        <div class="path">/gallery.html</div>
        <span class="tag">APP</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
